<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Museu de Linguagens do Mundo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 30, 0.7);
            --primary-gold: #d4af37;
            --secondary-gold: #f0e68c;
            --accent-purple: #8a2be2;
            --accent-cyan: #00f2ff;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --transition-speed: 0.3s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.6;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 60px; }
        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--primary-gold), var(--accent-cyan), var(--primary-gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 4px;
            animation: gradientFlow 5s linear infinite;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            flex: 1;
            min-width: 180px;
            max-width: 250px;
        }

        .stat h3 { font-family: 'Orbitron', sans-serif; font-size: 2em; color: var(--primary-gold); }

        .search-container {
            margin-bottom: 40px;
            position: relative;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-container i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: var(--primary-gold);
        }

        .search-container input {
            padding: 15px 20px 15px 50px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 50px;
            width: 100%;
            background: rgba(15, 15, 25, 0.8);
            color: white;
            font-family: 'Roboto', sans-serif;
        }

        .categories-menu {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .category-btn {
            padding: 10px 18px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 25px;
            background: rgba(212, 175, 55, 0.05);
            color: var(--primary-gold);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .category-btn.active {
            background: var(--primary-gold);
            color: var(--bg-color);
        }

        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .language-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: 0.4s;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        .language-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .language-card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .language-icon { font-size: 2.5em; }
        .language-card h3 { font-family: 'Orbitron', sans-serif; color: var(--primary-gold); }

        .meta-tag {
            font-size: 0.7em;
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            padding: 3px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }

        .modal-content {
            background: #0f0f1a; border: 1px solid var(--primary-gold); border-radius: 20px;
            width: 90%; max-width: 900px; height: 80vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .modal-header { padding: 20px; border-bottom: 1px solid rgba(212,175,55,0.2); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; padding: 30px; overflow-y: auto; }

        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <header>
            <h1>Museu de Linguagens</h1>
            <p style="color: var(--primary-gold); text-transform: uppercase; letter-spacing: 2px;">O maior acervo digital de tecnologias</p>
        </header>

        <div class="stats">
            <div class="stat"><h3>505+</h3><p>Linguagens</p></div>
            <div class="stat"><h3>5.050+</h3><p>Exercícios</p></div>
            <div class="stat"><h3>10.100+</h3><p>Arquivos</p></div>
        </div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar linguagem...">
        </div>

        <div class="categories-menu">
            <button class="category-btn active" data-category="all">🌍 Todas</button>
            <button class="category-btn" data-category="web">🌐 Web</button>
            <button class="category-btn" data-category="systems">⚙️ Sistêmicas</button>
            <button class="category-btn" data-category="functional">🧮 Funcionais</button>
            <button class="category-btn" data-category="database">🗄️ Dados</button>
            <button class="category-btn" data-category="esoteric">🎭 Esotéricas</button>
            <button class="category-btn" data-category="favorites">⭐ Favoritos</button>
        </div>

        <div class="languages-grid" id="languagesGrid"></div>
    </div>

    <div id="languageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" style="color: var(--primary-gold);">Linguagem</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2em; cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const languageIcons = {
            'PYTHON': '🐍', 'JAVASCRIPT': '📜', 'JAVA': '☕', 'CSHARP': '#️⃣', 'C++': '⚙️', 'C': '🔤', 
            'RUBY': '💎', 'PHP': '🐘', 'RUST': '🦀', 'GO': '🐹', 'HASKELL': 'λ', 'SQL': '🗄️', 'HTML': '🌐'
        };

        const languagesData = [
            { name: 'PYTHON', category: 'web', year: 1991 },
            { name: 'JAVASCRIPT', category: 'web', year: 1995 },
            { name: 'JAVA', category: 'systems', year: 1995 },
            { name: 'RUST', category: 'systems', year: 2010 },
            { name: 'HASKELL', category: 'functional', year: 1990 },
            { name: 'BRAINFUCK', category: 'esoteric', year: 1993 },
            { name: 'SQL', category: 'database', year: 1974 },
            { name: 'C++', category: 'systems', year: 1985 },
            { name: 'GO', category: 'systems', year: 2009 }
        ];

        // Simular 500 linguagens para preencher o grid
        for(let i=0; i<496; i++) {
            languagesData.push({ name: `LANG_${i}`, category: 'all', year: 2000 + (i % 24) });
        }

        function render(filter = 'all', search = '') {
            const grid = document.getElementById('languagesGrid');
            grid.innerHTML = '';
            const filtered = languagesData.filter(l => {
                const matchCat = filter === 'all' || l.category === filter;
                const matchSearch = l.name.toLowerCase().includes(search.toLowerCase());
                return matchCat && matchSearch;
            });

            filtered.forEach(l => {
                const icon = languageIcons[l.name] || '💻';
                const card = document.createElement('div');
                card.className = 'language-card';
                card.innerHTML = `
                    <div class="language-card-header">
                        <div class="language-icon">${icon}</div>
                        <div>
                            <h3>${l.name}</h3>
                            <span class="meta-tag">${l.year}</span>
                        </div>
                    </div>
                    <p style="font-size: 0.8em; color: var(--text-dim);">Clique para explorar detalhes e exercícios desta tecnologia.</p>
                `;
                card.onclick = () => openModal(l.name);
                grid.appendChild(card);
            });
        }

        function openModal(name) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalBody').innerHTML = `<h3>Sobre ${name}</h3><p>Conteúdo em auditoria...</p>`;
            document.getElementById('languageModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('languageModal').style.display = 'none'; }

        document.getElementById('searchInput').oninput = (e) => render('all', e.target.value);
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.category-btn.active').classList.remove('active');
                btn.classList.add('active');
                render(btn.dataset.category);
            };
        });

        // Fundo Animado
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const stars = Array.from({length: 100}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2 }));
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#d4af37';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y += 0.2; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animate);
        }

        render();
        animate();
    </script>
</body>
</html>
