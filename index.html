<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Museu de Linguagens do Mundo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-in;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 50%, #daa520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            font-weight: 900;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.3em;
            color: #b8860b;
            opacity: 0.95;
            font-weight: 500;
        }

        .search-container {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-container input {
            padding: 14px 24px;
            border: 2px solid #d4af37;
            border-radius: 30px;
            width: 350px;
            font-size: 1em;
            background: rgba(30, 30, 40, 0.8);
            color: #e0e0e0;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .search-container input::placeholder {
            color: #888;
        }

        .search-container input:focus {
            outline: none;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
            border-color: #f0e68c;
            background: rgba(30, 30, 40, 0.95);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(218, 165, 32, 0.05) 100%);
            padding: 25px 40px;
            border-radius: 15px;
            border: 2px solid #d4af37;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .stat:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            border-color: #f0e68c;
        }

        .stat h3 {
            font-size: 2.5em;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: 900;
        }

        .stat p {
            color: #b8860b;
            font-size: 1.1em;
            font-weight: 500;
        }

        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .language-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, rgba(218, 165, 32, 0.03) 100%);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .language-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .language-card:hover::before {
            left: 100%;
        }

        .language-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.3);
            border-color: #d4af37;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(218, 165, 32, 0.08) 100%);
        }

        .language-card h3 {
            font-size: 1.4em;
            margin-bottom: 10px;
            word-break: break-word;
            color: #d4af37;
            font-weight: 700;
        }

        .language-card p {
            font-size: 0.95em;
            color: #a0a0a0;
            margin-bottom: 12px;
        }

        .language-card .badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0a0a0a;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            width: fit-content;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        .language-card:hover .badge {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5);
        }

        .hidden {
            display: none;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #d4af37;
            font-size: 1.3em;
            background: rgba(212, 175, 55, 0.05);
            border: 2px dashed #d4af37;
            border-radius: 15px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #b8860b;
            border-top: 2px solid rgba(212, 175, 55, 0.2);
            margin-top: 50px;
        }

        footer a {
            color: #d4af37;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        footer a:hover {
            text-decoration: underline;
            color: #f0e68c;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .language-card {
            animation: fadeIn 0.5s ease-in;
        }

        /* Scrollbar customizado */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f0e68c;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2em;
            }

            header p {
                font-size: 1.1em;
            }

            .search-container input {
                width: 100%;
            }

            .languages-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .stat {
                padding: 20px 30px;
            }

            .stat h3 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 MUSEU DE LINGUAGENS DO MUNDO</h1>
            <p>✨ Explore 505+ linguagens de programação com exemplos, exercícios e documentação ✨</p>
        </header>

        <div class="stats">
            <div class="stat">
                <h3>505+</h3>
                <p>Linguagens</p>
            </div>
            <div class="stat">
                <h3>5.050+</h3>
                <p>Exercícios</p>
            </div>
            <div class="stat">
                <h3>10.100+</h3>
                <p>Arquivos</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar linguagem (ex: Python, JavaScript, Rust, Bun, Deno)...">
        </div>

        <div class="languages-grid" id="languagesGrid">
            <!-- Será preenchido por JavaScript -->
        </div>

        <footer>
            <p>Desenvolvido com ❤️ em Dourado | <a href="https://github.com/Nagato09-dev/museu-de-linguagens-do-mundo" target="_blank">Ver no GitHub →</a></p>
        </footer>
    </div>

            "COQ_PROOF", "COZO", "CPLUSPLUS", "CRYSTAL", "CSHARP", "CSOUND", "CSS", "CUDA", "CUNEIFORM", "CURRY",

            "VISUAL_BASIC", "VOLT", "VUE", "VYPER", "VYXAL", "WDL", "WEBASSEMBLY", "WEBIDL", "WHENEVER", "WHILEY",

            "ZEPHIR", "ZIG", "ZIMPL", "ZOMBIE", "ZSH"

        allLanguages.forEach(lang => {
            languages.push({
                name: lang,
                path: `https://github.com/Nagato09-dev/museu-de-linguagens-do-mundo/tree/master/linguagens/${lang}`
            });
        });

        function renderLanguages(languagesToRender) {
            const grid = document.getElementById('languagesGrid');
            grid.innerHTML = '';

            if (languagesToRender.length === 0) {
                grid.innerHTML = '<div class="no-results">🔍 Nenhuma linguagem encontrada. Tente outra busca!</div>';
                return;
            }

            languagesToRender.forEach(lang => {
                const card = document.createElement('a');
                card.href = lang.path;
                card.target = '_blank';
                card.className = 'language-card';
                card.innerHTML = `
                    <div>
                        <h3>${lang.name}</h3>
                        <p>Clique para explorar</p>
                    </div>
                    <span class="badge">Ver Detalhes →</span>
                `;
                grid.appendChild(card);
            });
        }

        // Busca em tempo real
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = languages.filter(lang => lang.name.toLowerCase().includes(searchTerm));
            renderLanguages(filtered);
        });

        // Renderizar todas as linguagens ao iniciar
        renderLanguages(languages);
    </script>
</body>
</html>
